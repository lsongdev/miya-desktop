name: Build

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.version.outputs.tag_name }}
    steps:
      - name: Generate version tag
        id: version
        run: echo "tag_name=$(date -u '+%y.%m.%d')" >> "$GITHUB_OUTPUT"

      - name: Delete existing release
        run: gh release delete "${{ steps.version.outputs.tag_name }}" --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  macos:
    name: Build macOS
    needs: prepare
    runs-on: macos-latest
    steps:
      - name: Checkout desktop
        uses: actions/checkout@v4
        with:
          path: miya-desktop

      - name: Checkout agents
        uses: actions/checkout@v4
        with:
          repository: lsongdev/miya-agents
          path: miya-agents

      - name: Checkout channels
        uses: actions/checkout@v4
        with:
          repository: lsongdev/miya-channels
          path: miya-channels

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: miya-desktop/go.mod
          cache-dependency-path: |
            miya-desktop/go.sum
            miya-agents/go.sum
            miya-channels/go.sum

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: miya-desktop/frontend/package-lock.json

      - name: Build
        working-directory: miya-desktop
        run: make build-macos

      - name: Package
        working-directory: miya-desktop
        run: |
          mkdir -p build/artifacts
          ditto -c -k --keepParent bin/Miya.app build/artifacts/miya-desktop-darwin-universal.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: miya-desktop/build/artifacts/*

  windows:
    name: Build Windows
    needs: prepare
    runs-on: windows-latest
    steps:
      - name: Checkout desktop
        uses: actions/checkout@v4
        with:
          path: miya-desktop

      - name: Checkout agents
        uses: actions/checkout@v4
        with:
          repository: lsongdev/miya-agents
          path: miya-agents

      - name: Checkout channels
        uses: actions/checkout@v4
        with:
          repository: lsongdev/miya-channels
          path: miya-channels

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: miya-desktop/go.mod
          cache-dependency-path: |
            miya-desktop/go.sum
            miya-agents/go.sum
            miya-channels/go.sum

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: miya-desktop/frontend/package-lock.json

      - name: Build
        working-directory: miya-desktop
        shell: bash
        run: make build-windows

      - name: Package
        working-directory: miya-desktop
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build/artifacts | Out-Null
          Compress-Archive -Path bin/miya-desktop.exe -DestinationPath build/artifacts/miya-desktop-windows-amd64.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: miya-desktop/build/artifacts/*

  release:
    name: Create Release
    needs: [prepare, macos, windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          name: Miya ${{ needs.prepare.outputs.tag_name }}
          prerelease: true
          files: |
            macos/*
            windows/*
