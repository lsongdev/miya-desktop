version: "3"

vars:
  APP_NAME: miya-desktop
  BIN_DIR: bin
  VITE_PORT: '{{.WAILS_VITE_PORT | default 9245}}'

tasks:
  app:build:
    summary: Build the Miya Desktop spike binary.
    cmds:
      - cd frontend && npm run build
      - mkdir -p {{.BIN_DIR}}
      - go build -o {{.BIN_DIR}}/{{.APP_NAME}} .

  build:backend:
    summary: Build only the Go backend for dev mode.
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - go build -gcflags=all="-N -l" -o {{.BIN_DIR}}/{{.APP_NAME}} .

  build:
    summary: Build the Miya Desktop spike binary.
    cmds:
      - task: app:build

  darwin:build:
    cmds:
      - task: app:build

  windows:build:
    cmds:
      - task: app:build

  linux:build:
    cmds:
      - task: app:build

  run:
    summary: Run the Miya Desktop spike binary.
    deps:
      - app:build
    cmds:
      - ./{{.BIN_DIR}}/{{.APP_NAME}}

  run:dev:
    summary: Run the current dev binary.
    cmds:
      - ./{{.BIN_DIR}}/{{.APP_NAME}}

  frontend:dev:
    summary: Run the Vite frontend dev server.
    dir: frontend
    cmds:
      - npm run dev

  dev:
    summary: Run the Wails v3 dev loop.
    cmds:
      - wails3 dev -config ./build/config.yml -port {{.VITE_PORT}}
